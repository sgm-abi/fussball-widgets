name: ABI Fussball Widgets aktualisieren

on:
  schedule:
    # Täglich 12:30 Uhr Ortszeit
    # MESZ (Sommer, UTC+2): 10:30 UTC
    # MEZ  (Winter, UTC+1): 11:30 Uhr → nehmen 10:30 UTC als Kompromiss
    - cron: "30 10 * * *"
  workflow_dispatch:  # Manueller Start per Knopf in GitHub möglich

jobs:
  update-widgets:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 paramiko pandas

      - name: Widgets generieren und hochladen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: python scripts/fussball_widget_scraper.py

      - name: Startseite generieren und hochladen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: cd scripts && python Extract_table_from_fussball.py

      - name: KW-Archivdateien ins Repo committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/spiele_KW*.html
          git diff --cached --quiet || git commit -m "KW-Archiv aktualisiert [skip ci]"
          git push
