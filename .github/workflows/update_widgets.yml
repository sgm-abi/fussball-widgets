name: ABI Fussball Widgets aktualisieren

on:
  schedule:
    # MEZ  (Winter, UTC+1): 17:00 Uhr
    # MESZ (Sommer, UTC+2): 18:00 Uhr
    - cron: "0 16 * * *"
  workflow_dispatch:  # Manueller Start per Knopf in GitHub möglich

jobs:
  update-widgets:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Erlaubt dem Bot, KW-Archivdateien ins Repo zu pushen
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 paramiko pandas

      - name: Widgets generieren und hochladen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: python scripts/widget_pro_team.py

      - name: Startseite generieren und hochladen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: python scripts/wochenplan.py

      - name: KW-Archivdateien ins Repo committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add htmls/spiele_KW*.html
          git diff --cached --quiet || git commit -m "KW-Archiv aktualisiert [skip ci]"
          git push
